<!-- Tabla -->
<div class="container mt-4">
    <h1>Notas Alumnos</h1>
    <hr>

    <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#ModalAgregarNotaAlumno">
        Agregar
    </button>

    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Id</th>
                <th>Alumno</th>
                <th>Asignatura</th>
                <th>Nota</th>
                <th></th>
                <th></th>
            </tr>
        </thead>
        <tbody id="TablaNotas"></tbody>
    </table>
</div>

<!-- MODAL CREAR -->
<div class="modal fade" id="ModalAgregarNotaAlumno" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content text-dark">

            <div class="modal-header">
                <h5>Agregar Nota</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <select id="AlumnosId" class="form-select mb-2"></select>

                <select id="AsignaturasId" class="form-select mb-2"></select>

                <input type="number" id="Nota" class="form-control" placeholder="Nota (1-10)">

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="CrearNota()">Guardar</button>
            </div>

        </div>
    </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="ModalEditarNotaAlumno" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content text-dark">

            <div class="modal-header">
                <h5>Editar Nota</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="IdEditar">

                <select id="AlumnoIdEditar" class="form-select mb-2"></select>

                <select id="AsignaturaIdEditar" class="form-select mb-2"></select>

                <input type="number" id="NotaEditar" class="form-control">

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="EditarNota()">Guardar</button>
            </div>

        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    window.onload = function () {

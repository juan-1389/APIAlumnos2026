<!-- Tabla -->
<div class="container mt-4">
    <h1>Asignaturas</h1>
    <hr>

    <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#ModalAgregarAsignatura">
        Agregar
    </button>

    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Id</th>
                <th>Descripcion</th>
                <th>Eliminado</th>
                <th></th>
                <th></th>
            </tr>
        </thead>
        <tbody id="TodosLasAsignaturas"></tbody>
    </table>
</div>

<!-- Modal Crear -->
<div id="ModalAgregarAsignatura" class="modal fade" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Agregar Asignatura</h5>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Descripcion</label>
          <input type="text" id="Descripcion" class="form-control" placeholder="Descripcion">
        </div>

        <div class="mb-3 form-check">
          <label class="form-check-label">Eliminado</label>
          <input type="checkbox" id="Eliminado" class="form-check-input">
        </div>

        <p id="error" hidden class="text-danger"></p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="CrearAsignatura()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<!-- Modal Editar -->
<div id="ModalEditarAsignatura" class="modal fade" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar Asignatura</h5>
      </div>

      <div class="modal-body">
        <input type="hidden" id="IdAsignaturaEditar">

        <div class="mb-3">
          <label class="form-label">Descripcion</label>
          <input type="text" id="DescripcionEditar" class="form-control">
        </div>

        <div class="mb-3 form-check">
          <label class="form-check-label">Eliminado</label>
          <input type="checkbox" id="EliminadoEditar" class="form-check-input">
        </div>


        <p id="erroreditar" hidden class="text-danger"></p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="EditarAsignatura()">Guardar</button>
      </div>

    </div>
  </div>
</div>

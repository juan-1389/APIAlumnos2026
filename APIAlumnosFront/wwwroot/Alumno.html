</head>

  <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="Alumno.html">Alumnos</a>

          <li class="nav-item">

          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Tabla -->
  <div class="container mt-4">
    <h1>Alumno</h1>
    <hr>

    <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#ModalAgregarAlumno">
      Agregar
    </button>

    <table class="table table-dark table-striped">
      <thead>
        <tr>
          <th>Id</th>
          <th>Nombre</th>
          <th>Dni</th>
          <th>Sexo</th>
          <th>Domicilio</th>
          <th></th>
          <th></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="TodosLosAlumnos"></tbody>
    </table>
  </div>

  <!-- Modal Crear -->
  <div id="ModalAgregarAlumno" class="modal fade" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Agregar Alumno</h5>
        </div>

        <div class="modal-body">

          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" id="Nombre" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">DNI</label>
            <input type="number" id="Dni" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Sexo</label>
            <select id="Sexo" class="form-control">
              <option value="">Seleccione</option>
              <option value="1">Masculino</option>
              <option value="2">Femenino</option>
              <option value="3">Otro</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Domicilio</label>
            <input type="text" id="Domicilio" class="form-control">
          </div>

          <p id="error" class="text-danger" hidden></p>

        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" onclick="CrearAlumno()">Guardar</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Modal Editar -->
  <div id="ModalEditarAlumno" class="modal fade" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Editar Alumno</h5>
        </div>

        <div class="modal-body">

          <input type="hidden" id="IdAlumnoEditar">

          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" id="NombreEditar" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">DNI</label>
            <input type="number" id="DniEditar" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Sexo</label>
            <select id="SexoEditar" class="form-control">
              <option value="">Seleccione</option>
              <option value="1">Masculino</option>
              <option value="2">Femenino</option>
              <option value="3">Otro</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Domicilio</label>
            <input type="text" id="DomicilioEditar" class="form-control">
          </div>

          <p id="erroreditar" class="text-danger" hidden></p>

        </div>


        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" onclick="EditarAlumno()">Guardar</button>
        </div>

      </div>
    </div>
  </div>
  <!-- Modal historial -->
  <div id="modalHistorialAlumno" class="modal fade" tabindex="-1" data-bs-backdrop="static"
    aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5 subTitulo-vista">HISTORIAL DE CAMBIOS DEL ALUMNO</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">

          <table class="table">
            <thead>
              <tr>
                <th class="text-center" scope="col">Fecha Edición</th>
                <th scope="col">Atributo</th>
                <th scope="col">Valor Anterior</th>
                <th scope="col">Valor Nuevo</th>
              </tr>
            </thead>
            <tbody id="tbody-historial-notas">

            </tbody>
          </table>

        </div>
      </div>
    </div>
  </div>



  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/alumno.js"></script>

  <script>
    window.onload = ObtenerAlumnos;
  </script>

</body>

</html>
